services:
  n8n:
    build: .
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=tu_clave_segura_aqui_123
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=internal
      - N8N_PYTHON_PATH=/home/node/python-venv/bin/python3
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
